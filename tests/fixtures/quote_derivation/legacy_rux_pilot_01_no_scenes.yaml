  # 同社區，兩組客戶選的理由差很多

  ## 6 段時間軸

  **0-3 秒 Hook**
  台詞：「我帶兩組客戶看同一個鼓山社區，選的理由差很多。」

  **3-12 秒 破題**
  台詞：「你知道嗎？很多人以為買房就是比條件。」

  **12-25 秒 核心**
  台詞：「他在問的不是車位，是作息。」

  **25-40 秒 案例**
  台詞：「我跟你說，這兩組選的，其實都不是房子。」

  **40-52 秒 收束**
  台詞：「他們兩組都沒提到坪數。一句都沒提。」

  **52-60 秒 CTA**
  台詞：「不確定自己在選什麼的，留言『諮詢』，我帶你繞繞，問問不用錢。」

  ## Caption
  帶兩組客戶看同一個鼓山社區，最後都買了。

